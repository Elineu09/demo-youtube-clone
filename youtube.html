<!doctype html>
<html>
  <head>
    <title>Youtube.com Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/sidebar.css" />
    <link rel="stylesheet" href="styles/video.css" />
  </head>
  <body>
    <div class="header">
      <div class="left-section">
        <img class="hamburguer-menu" src="icons/hamburger-menu.svg" />
        <img class="youtube-logo" src="icons/youtube-logo.svg" />
      </div>
      <div class="middle-section">
        <input type="text" placeholder="Search" class="search-bar" />
        <button class="search-button">
          <img class="search-icon" src="icons/search.svg" /></button
        ><button class="voice-search-button">
          <img class="search-voice-icon" src="icons/voice-search-icon.svg" />
        </button>
      </div>
      <div class="right-section">
        <img class="upload-icon" src="icons/upload.svg" />
        <img class="youtube-apps-icon" src="icons/youtube-apps.svg" />
        <div class="notifications-icon-container">
          <img class="notifications-icon" src="icons/notifications.svg" />
          <div class="notifications-count">3</div>
        </div>
        <img
          class="current-user-picture"
          src="channel-pictures/my-channel.jpeg"
        />
      </div>
    </div>
    <div class="sidebar">
      <div class="sidebar-link"><img src="icons/home.svg"><p>Home</p></div>
      <div class="sidebar-link"><img src="icons/explore.svg"><p>Explore</p></div>
      <div class="sidebar-link"><img  src="icons/subscriptions.svg"><p>Subscriptions</p></div>
      <div class="sidebar-link"><img  src="icons/originals.svg"><p>Originals</p></div>
      <div class="sidebar-link"><img src="icons/youtube-music.svg"><p>YouTube Music</p></div>
      <div class="sidebar-link"><img src="icons/library.svg"><p>Library</p></div>
    </div>
    <div class="video-grid"></div>
    <script src="script/main.js"></script>
  </body>
</html>
