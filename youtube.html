<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Youtube.com Clone</title>
    <style>
      p {
        font-family: Roboto, Arial;
        margin-top: 0;
        margin-bottom: 0;
      }
      .thumbnail {
        width: 300px;
        display: inline-block;
      }

      .search-bar {
        display: block;
      }

      .video-prev {
        width: 300px;
        display: inline-block;
        margin-right: 15px;
        vertical-align: top;
      }

      .thumbnail-row {
        margin-bottom: 12px;
      }

      .channel-picture {
        display: inline-blocK;
        width: 50px;
        vertical-align: top;
      }

      .profile-picture {
        width: 40px;
        border-radius: 50px;
      }

      .video-info {
        display: inline-block;
        width: 200px;
        vertical-align: top;
      }

      .video-title {
        margin-top: 0;
        margin-bottom: 12px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
      }

      .video-author,
      .video-stats {
        font-size: 12px;
        color: rgb(96, 96, 96);
      }

      .video-author {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <input type="text" placeholder="Search" class="search-bar" />

    <div class="video-prev">
      <div class="thumbnail-row">
        <img src="thumbnails/thumbnail-1.webp" class="thumbnail" />
      </div>
      <div>
        <div class="channel-picture">
          <img src="channel-pictures/channel-1.jpeg" class="profile-picture" />
        </div>
        <div class="video-info">
          <p class="video-title">
            Talking Tech and AI with Google CEO Sundar Pichai!
          </p>
          <p class="video-author">Marques Brownlee</p>
          <p class="video-stats">3.4M views &#183; 6 months ago</p>
        </div>
      </div>
    </div>

    <div class="video-prev">
      <div class="thumbnail-row">
        <img src="thumbnails/thumbnail-2.webp" class="thumbnail" />
      </div>
      <div>
        <div class="channel-picture">
          <img src="channel-pictures/channel-2.jpeg" class="profile-picture" />
        </div>
        <div class="video-info">
      <p class="video-title">Try Not To Laugh Challenge #9</p>
      <p class="video-author">Markiplier</p>
      <p class="video-stats">19M views &#183; 4 years ago</p>
        </div>
      </div>
    </div>
  </body>
</html>
